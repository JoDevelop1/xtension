<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Xtension</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <img class="popup-logo" src="icons/icon-48.png" alt="" width="40" height="40">
        <div>
          <h1 data-i18n="extensionName">Xtension</h1>
          <p data-i18n="popupSubtitle">X/Twitter tools and AI settings</p>
        </div>
      </header>

      <div class="popup-actions">
        <button id="open-options" type="button" data-i18n="popupOpenSettings">Open settings</button>
      </div>

      <p class="popup-note" data-i18n="popupNote">PDF export and reply tools appear directly inside X/Twitter.</p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
